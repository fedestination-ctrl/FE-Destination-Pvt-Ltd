<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study in UK | Foreign Education Destination</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f8f9fa; margin: 0; }
        .container { padding: 50px 5%; max-width: 1000px; margin: auto; }
        h1 { color: #0d47a1; }
        .hero-img { width: 100%; height: 300px; object-fit: cover; border-radius: 15px; margin-bottom: 20px; }
        .details-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-top: 30px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-back { display: inline-block; margin-top: 20px; padding: 10px 20px; background: #0d47a1; color: white; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="btn-back"><i class="fas fa-arrow-left"></i> Back to Home</a>
    <h1>Study in the United Kingdom 🇬🇧</h1>
    <img src="https://images.pexels.com/photos/460672/pexels-photo-460672.jpeg" class="hero-img" alt="London Big Ben">
    
    <div class="details-grid">
        <div class="card">
            <h3>🎓 Entry Requirements</h3>
            <ul>
                <li>12 Years of Education (FSc/A-Levels).</li>
                <li>IELTS: Minimum 6.0 - 6.5 bands.</li>
                <li>Statement of Purpose (SOP) is mandatory.</li>
            </ul>
        </div>
        <div class="card">
            <h3>🏙️ Famous Locations</h3>
            <p>London, Manchester, Edinburgh, and Birmingham are hubs for international students.</p>
        </div>
    </div>
</div>

</body>
</html>
