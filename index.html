<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foreign Education Destination</title>
    <style>
        /* Basic styling */
        body { font-family: Arial, sans-serif; line-height: 1.6; margin: 20px; }
        section { margin-bottom: 40px; padding: 20px; border: 1px solid #ddd; }
        .social-links a { margin-right: 15px; text-decoration: none; color: blue; }
    </style>
</head>
<body>

    <header>
        <h1>Foreign Education Destination</h1>
        <div class="social-links">
            <a href="#">Facebook</a>
            <a href="#">Instagram</a>
            <a href="#">TikTok</a>
            <a href="#">YouTube</a>
        </div>
    </header>

    <!-- Destinations Section (Upar) -->
    <section id="destinations">
        <h2>Our Destinations</h2>
        <p>We offer consultancy and services for UK, Europe, Australia, Malaysia, New Zealand, UAE, Turkey.</p>
    </section>

    <!-- Services Section (Neeche) -->
    <section id="services">
        <h2>Our Services</h2>
        <p>Expert guidance for your study abroad journey.</p>
    </section>

    <!-- Contact Form (Formspree) -->
    <section id="contact">
        <h2>Contact Us</h2>
        <form action="https://formspree.io/f/xpqvpanq" method="POST">
            <label>Your email:</label><br>
            <input type="email" name="email" required><br><br>
            
            <label>Your message:</label><br>
            <textarea name="message" required></textarea><br><br>
            
            <button type="submit">Send</button>
        </form>
    </section>

</body>
</html>
